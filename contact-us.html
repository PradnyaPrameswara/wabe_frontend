<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Contact Us | Widhi Asih Bali Export</title>
    <meta content="Contact Us" property="og:title" />
    <meta content="Contact Us" name="twitter:title" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link href="assets/css/site.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/layout-overrides.css" rel="stylesheet" type="text/css" />
    <link
      href="assets/media/6a2680f03f3745a0ac723d08_Favicon.png"
      rel="shortcut icon"
      type="image/x-icon"
    />
    <link
      href="assets/media/6a2680f03f3745a0ac723d09_Webclip.png"
      rel="apple-touch-icon"
    />
  </head>
  <body>
    <div data-shared-layout="desktop-menu"></div>
    <div data-shared-layout="mobile-menu"></div>

    <section class="section first">
      <div class="contact-page-grid">
        <div class="contact-page-intro block outline">
          <h4>Request a Custom Design</h4>
          <p>
            Share your idea with us and our artisans will help turn it into a custom
            piece crafted for your needs.
          </p>
          <div class="contact-page-details">
            <a class="contact-page-detail-link" href="mailto:info@widhiasihbaliexport.com">
              info@widhiasihbaliexport.com
            </a>
            <a class="contact-page-detail-link" href="tel:+62361953239">
              +62 361 953 239 (Bali Time: GMT+8)
            </a>
            <p>Jl. Ratna No. 68, Tegal Tugu, Gianyar, Bali, Indonesia</p>
          </div>
          <div class="contact-page-map-shell">
            <iframe
              class="contact-page-map"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps?q=Jl.+Ratna+No.+68,+Tegal+Tugu,+Gianyar,+Bali,+Indonesia&z=16&output=embed"
              title="Widhi Asih Bali Export location map"
            ></iframe>
            <a
              class="button-text inline-block contact-page-map-link"
              href="https://maps.app.goo.gl/hLQCSu9BvFQNq6kS8"
              rel="noopener noreferrer"
              target="_blank"
            >
              <h6>Open Map View</h6>
              <div class="underline" style="width: 0%"></div>
            </a>
          </div>
        </div>
        <div class="block outline">
          <form class="custom-contact-form">
            <div class="custom-contact-field">
              <label for="contact-name">Name</label>
              <input
                class="input-control"
                id="contact-name"
                name="name"
                placeholder="Enter your full name"
                required=""
                type="text"
              />
            </div>

            <div class="custom-contact-field">
              <label for="contact-email">Email</label>
              <input
                class="input-control"
                id="contact-email"
                name="email"
                placeholder="you@example.com"
                required=""
                type="email"
              />
            </div>

            <div class="custom-contact-field">
              <label for="contact-phone">Phone</label>
              <input
                class="input-control"
                id="contact-phone"
                name="phone"
                placeholder="e.g. +62 361 953 239"
                required=""
                type="tel"
              />
            </div>

            <div class="custom-contact-field">
              <label for="contact-company">Company</label>
              <input
                class="input-control"
                id="contact-company"
                name="company"
                placeholder="Your company name (optional)"
                type="text"
              />
            </div>

            <div class="custom-contact-field">
              <label for="contact-message">Message</label>
              <textarea
                class="input-control"
                id="contact-message"
                name="message"
                required=""
                rows="7"
              ></textarea>
            </div>

            <button class="custom-contact-submit" type="submit">Send Request</button>
          </form>
        </div>
      </div>
    </section>

    <div data-shared-layout="footer"></div>

    <script src="assets/js/site.js"></script>
  </body>
</html>
