<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Category | Widhi Asih Bali Export</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link href="../assets/css/site.css" rel="stylesheet" type="text/css" />
    <link href="../assets/css/layout-overrides.css" rel="stylesheet" type="text/css" />
    <link
      href="../assets/media/6a2680f03f3745a0ac723d08_Favicon.png"
      rel="shortcut icon"
      type="image/x-icon"
    />
    <link
      href="../assets/media/6a2680f03f3745a0ac723d09_Webclip.png"
      rel="apple-touch-icon"
    />
  </head>
  <body>
    <div data-shared-layout="desktop-menu"></div>
    <div data-shared-layout="mobile-menu"></div>

    <div class="global-css-styles embed-block">
      <style>
        .product-wrapper-item {
          flex-grow: 1;
          flex-shrink: 0;
          flex-basis: calc((100% - (4 * 16px)) / 6);
        }

        .product-wrapper-item:nth-child(3),
        .product-wrapper-item:nth-child(5),
        .product-wrapper-item:nth-child(7),
        .product-wrapper-item:nth-child(9) {
          flex-grow: 1;
          flex-shrink: 0;
          flex-basis: calc(((100% - (4 * 16px)) / 6) * 1.5);
        }

        .truncate {
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .select-field {
          -webkit-appearance: none;
          -moz-appearance: none;
          appearance: none;
          background-image: url("../assets/media/65758c0babe35789fbfd9897_Chevron--down.svg");
          background-position: right 12px center;
          background-repeat: no-repeat;
          background-size: 8px;
          padding-right: 20px;
        }

        option {
          background-color: #f0f0f0;
          color: #333;
        }

        @media (max-width: 768px) {
          .product-wrapper-item {
            flex-basis: calc((100% - 16px) / 2);
          }

          .product-wrapper-item:nth-child(3),
          .product-wrapper-item:nth-child(5),
          .product-wrapper-item:nth-child(7),
          .product-wrapper-item:nth-child(9) {
            flex-basis: calc((100% - 16px) / 2);
          }
        }
      </style>
    </div>

    <section class="section first">
      <div class="_2-column">
        <h4 data-category-title></h4>
        <div class="rich-text rich-text">
          <p data-category-description></p>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="product-wrapper collection-list">
        <div
          class="large-product-grid collection-items"
          data-category-products
          role="list"
        ></div>
        <div class="empty-state is-hidden" data-category-empty>
          <div>No items found.</div>
        </div>
        <div
          aria-label="List"
          class="pagination-wrapper pagination"
          role="navigation"
        ></div>
      </div>
    </section>

    <div data-shared-layout="footer"></div>

    <script src="../assets/js/site.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const categoryId = params.get("id");

      const setText = (selector, value) => {
        const element = document.querySelector(selector);
        if (element) {
          element.textContent = value || "";
        }
      };

      const toAssetPath = (path) => {
        if (!path || /^https?:\/\//i.test(path) || path.startsWith("../")) {
          return path || "";
        }

        return `../${path}`;
      };

      const showError = (message) => {
        setText("[data-category-title]", message);
        setText(
          "[data-category-description]",
          "Please go back to the collections page and choose a category."
        );
      };

      const createProductCard = (product) => {
        const detailUrl = `../product/product-detail.html?id=${encodeURIComponent(
          product.id
        )}`;
        const item = document.createElement("div");
        item.className = "product-wrapper-item collection-item";
        item.setAttribute("role", "listitem");

        const saleClass = product.compareAtPrice ? "on-sale" : "on-sale is-hidden";
        const compareClass = product.compareAtPrice
          ? "strikethrough"
          : "strikethrough is-empty";

        item.innerHTML = `
          <a class="product-item inline-block" href="${detailUrl}">
            <div class="image-container vertical">
              <img
                alt="${product.title}"
                class="product-image"
                loading="lazy"
                src="${toAssetPath(product.image)}"
              />
              <div class="${saleClass}"><div>SALE</div></div>
            </div>
          </a>
          <div class="product-information">
            <div class="product-information-brand collection-list">
              <div class="product-information-brand-list collection-items" role="list">
                <div class="product-information-brand-item collection-item" role="listitem">
                  <a class="brand-link inline-block" href="../category/category-detail.html?id=${encodeURIComponent(
                    categoryId
                  )}"><h6>${product.category}</h6></a>
                </div>
              </div>
            </div>
            <h6>/</h6>
            <h6>Latest</h6>
          </div>
          <a class="product-item inline-block" href="${detailUrl}">
            <div class="product-text"><div>${product.title}</div></div>
            <div class="product-text">
              <div class="${compareClass}">${product.compareAtPrice || ""}</div>
              <div>${product.price}</div>
            </div>
          </a>
        `;

        return item;
      };

      const renderCategory = (category, allProducts) => {
        document.title = `${category.title} | Widhi Asih Bali Export`;

        setText("[data-category-title]", category.title);
        setText("[data-category-description]", category.description);

        const productGrid = document.querySelector("[data-category-products]");
        const emptyState = document.querySelector("[data-category-empty]");
        const products = (category.products || [])
          .map((id) => allProducts.find((product) => product.id === id))
          .filter(Boolean);

        if (!productGrid || !emptyState) {
          return;
        }

        productGrid.innerHTML = "";
        products.forEach((product) => {
          productGrid.appendChild(createProductCard(product));
        });

        emptyState.classList.toggle("is-hidden", products.length > 0);
      };

      if (!categoryId) {
        showError("Category not found");
      } else {
        Promise.all([
          fetch("../categories.json").then((response) => {
            if (!response.ok) {
              throw new Error("Unable to load categories.json");
            }
            return response.json();
          }),
          fetch("../products.json").then((response) => {
            if (!response.ok) {
              throw new Error("Unable to load products.json");
            }
            return response.json();
          })
        ])
          .then(([categoryData, productData]) => {
            const categories = Array.isArray(categoryData)
              ? categoryData
              : categoryData.categories || [];
            const products = Array.isArray(productData)
              ? productData
              : productData.products || [];
            const category = categories.find((item) => item.id === categoryId);

            if (!category) {
              showError("Category not found");
              return;
            }

            renderCategory(category, products);
          })
          .catch(() => {
            showError("Category data could not be loaded");
          });
      }
    </script>
  </body>
</html>
